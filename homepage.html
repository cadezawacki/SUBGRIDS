

<div id="pageBody" class="homepage_pageBody">
    {% if dev_mode %}
        <script type="module" src="{{ vite_host }}/@vite/client"></script>
    {% else %}
        <link rel="stylesheet" href="{{ static_path }}/css/homepage.css">
    {% endif %}
    <div id="homepageBody" style="display:none">
        <div id="homepage-primary-row" class="homepage-primary-row">
            <div class="stats-col-left">
                <div id="hud-tabs" class="hud-tabs">
                    <div class="tab-item" data-metric="gross">
                        <div class="tab-value">
                            <span class="value-label">Gross Notional</span>
                            <span id="grossNtl" class="value-number">0</span>
                        </div>
                        <div id="grossNtlChange" class="tab-trend">
                            <div class="metric-trend-container">
                                <div class="metric-icon-container">
                                    <lord-icon trigger="in" delay="0" class="current-color" loading="lazy" target=".metric-trend" style="width: 18px; height: 18px;"> </lord-icon>
                                </div>
                                <div class="metric-value-container"></div>
                            </div>
                            <div class="metric-period-container"></div>
                        </div>
                    </div>
                    <div class="tab-item active" data-metric="net">
                        <div class="tab-value">
                            <span class="value-label">Net Notional</span>
                            <span id="netNtl" class="value-number">0</span>
                        </div>
                        <div id="netNtlChange" class="tab-trend">
                            <div class="metric-trend-container">
                                <div class="metric-icon-container">
                                    <lord-icon trigger="in" delay="0" class="current-color" loading="lazy" target=".metric-trend" style="width: 18px; height: 18px;"> </lord-icon>
                                </div>
                                <div class="metric-value-container"></div>
                            </div>
                            <div class="metric-period-container"></div>
                        </div>
                    </div>
                    <div class="tab-item" data-metric="winRate">
                        <div class="tab-value">
                            <span class="value-label">Win Rate</span>
                            <span id="winRate" class="value-number">0%</span>
                        </div>
                        <div id="winRateChange" class="tab-trend">
                            <div class="metric-trend-container">
                                <div class="metric-icon-container">
                                    <lord-icon trigger="in" delay="0" class="current-color" loading="lazy" target=".metric-trend" style="width: 18px; height: 18px;"> </lord-icon>
                                </div>
                                <div class="metric-value-container"></div>
                            </div>
                            <div class="metric-period-container"></div>
                        </div>
                    </div>
                    <div class="tab-item" data-metric="buySellRatio">
                        <div class="tab-value">
                            <span class="value-label">
                                <div id="buy-sell-settings-icon" class="cursor-pointer">Buy/Sell Ratio</div>
                            </span>
                            <span id="buySellRatio" class="value-number">0%</span>
                        </div>
                        <div id="buySellRatioChange" class="tab-trend">
                            <div class="metric-trend-container">
                                <div class="metric-icon-container">
                                    <lord-icon trigger="in" delay="0" class="current-color" loading="lazy" target=".metric-trend" style="width: 18px; height: 18px;"> </lord-icon>
                                </div>
                                <div class="metric-value-container"></div>
                            </div>
                            <div class="metric-period-container"></div>
                        </div>
                    </div>
                </div>
                <div class="date-range-controls">
                    <div class="daterangepicker-container">
                        <div id="daterange-input" class="cal-btns">
                            <lord-icon src="/assets/lottie/calendar.json" trigger="click" state="morph-calendar" target=".daterangepicker-container" stroke="bold" class="current-color" stroke="currentColor" style="width: 22px; height: 22px;"></lord-icon>
                            <span></span>
                            <svg class="chevron-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                    <div class="date-range-button disabled">
                        <div class="state-buttons">
                            <button id="today-btn" class="state-btn tooltip-top" data-tooltip="Jump to Today">
                                <div>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentcolor" stroke="none" viewBox="0 0 256 256"><path d="M136,80v43.47l36.12,21.67a8,8,0,0,1-8.24,13.72l-40-24A8,8,0,0,1,120,128V80a8,8,0,0,1,16,0Zm91.06-23.39a8,8,0,0,0-8.72,1.73L206,70.71c-3.23-3.51-6.56-7-10.1-10.59a96,96,0,1,0-2,137.7,8,8,0,0,0-11-11.64A80,80,0,1,1,184.54,71.4c3.54,3.58,6.87,7.1,10.11,10.63L178.34,98.34A8,8,0,0,0,184,112h40a8,8,0,0,0,8-8V64A8,8,0,0,0,227.06,56.61Z"></path></svg>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="hud-chart" class="hud-chart">
                <div class="chart-controls">
                    <div class="chart-controls-left">
                        <div class="dropdown">
                            <button class="btn btn-sm chart-type-btn">
                                <span id="current-chart-type"></span>
                            </button>
                            <ul class="dropdown-content chart-type-menu" id="chart-type-menu">
                                <!-- Dynamic populated dropdown -->
                            </ul>
                        </div>
                        <div id="zoom-controls">
                            <button id="zoom-in" class="btn btn-sm chart-type-btn">＋</button>
                            <button id="zoom-out" class="btn btn-sm chart-type-btn">−</button>
                            <button id="zoom-reset" class="btn btn-sm chart-type-btn">⭯</button>
                        </div>
                    </div>
                    <div id="chart-buttons">
                        <div class="tooltip-top" data-tooltip="Link to Grid" style="--tooltip-distance:10px;">
                            <div id="link-chart-to-grid-btn" class="">
                                <lord-icon stroke="light"
                                           target="#link-chart-to-grid-btn"
                                           class="current-color"
                                           style="height:28x;width:28px"
                                           src="/assets/lottie/link-hover.json">
                                </lord-icon>
                            </div>
                        </div>
                        <div>
                            <div id="chart-settings-button">
                                <lord-icon stroke="light"
                                           trigger="hover"
                                           target="#chart-settings-button"
                                           class="current-color"
                                           style="height:24px;width:24px"
                                           src="/assets/lottie/cog4-hover.json">
                                </lord-icon>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="chart-container" style="width:100%; min-width:0px; height:100%; position:relative">
                    <div class="chart-content-wrapper" style="position:absolute; top:0; left:0; right:0; bottom:0;">
                        <div id="hudChart"></div>
                        <canvas id="chartOverlay"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="homepage-secondary-row">
            <div class="grid-content">
                <div class="main-content-row">

                    <div id="activity-panel">
                        <div id="activity-panel-inner"></div>

                </div>
            </div>
        </div>

        <dialog id="chart-settings-modal" class="modal">
            <div class="chart-settings-container">
                <div class="chart-settings-content">
                    <header class="chart-settings-header">
                        <div class="header-main">
                            <h2>Widget Settings</h2>
                            <button class="close-button" aria-label="Close" onclick="this.closest('dialog').close()">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M6.7 6.7l10.6 10.6m0-10.6L6.7 17.3" stroke="currentColor" stroke-width="2" fill="none"/>
                                </svg>
                            </button>
                        </div>
                    </header>

                    <div class="chart-settings-body">
                        <div class="settings-layout">
                            <!-- Left Column -->
                            <section class="settings-sidebar">
                                <div class="global-settings">
                                    <button id="global-chart-settings-btn" type="button" data-metric="global"
                                            class="settings-button">
                                        <span class="button-content">
                                            <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256"><path d="M213.09,172.48a96,96,0,0,1-80.41,51.41l3.17-16.44a8,8,0,0,0-2-6.95l-19.74-20.33a8,8,0,0,1-1.44-8.69l13.7-30.74a8,8,0,0,1,8.38-4.67l22.82,3.08a8.11,8.11,0,0,1,3.12,1.11ZM116.71,95,129,88.24a7.46,7.46,0,0,0,1.5-1.07l26.91-24.33A8,8,0,0,0,159,53l-10.5-18.81A96.62,96.62,0,0,0,128,32,95.61,95.61,0,0,0,67.78,53.23L56,81.08A8,8,0,0,0,55.88,87l11.5,30.67a8,8,0,0,0,5.81,5l2.69.58L89.2,100a8,8,0,0,1,6.94-4h16.71A7.9,7.9,0,0,0,116.71,95Z" opacity="0.2"></path><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm88,104a87.62,87.62,0,0,1-6.4,32.94l-44.7-27.49a15.92,15.92,0,0,0-6.24-2.23l-22.82-3.08a16.11,16.11,0,0,0-16,7.86h-8.72l-3.8-7.86a15.91,15.91,0,0,0-11-8.67l-8-1.73L96.14,104h16.71a16.06,16.06,0,0,0,7.73-2l12.25-6.76a16.62,16.62,0,0,0,3-2.14l26.91-24.34A15.93,15.93,0,0,0,166,49.1l-.36-.65A88.11,88.11,0,0,1,216,128ZM143.31,41.34,152,56.9,125.09,81.24,112.85,88H96.14a16,16,0,0,0-13.88,8l-8.73,15.23L63.38,84.19,74.32,58.32a87.87,87.87,0,0,1,69-17ZM40,128a87.53,87.53,0,0,1,8.54-37.8l11.34,30.27a16,16,0,0,0,11.62,10l21.43,4.61L96.74,143a16.09,16.09,0,0,0,14.4,9h1.48l-7.23,16.23a16,16,0,0,0,2.86,17.37l.14.14L128,205.94l-1.94,10A88.11,88.11,0,0,1,40,128Zm102.58,86.78,1.13-5.81a16.09,16.09,0,0,0-4-13.9,1.85,1.85,0,0,1-.14-.14L120,174.74,133.7,144l22.82,3.08,45.72,28.12A88.18,88.18,0,0,1,142.58,214.78Z"></path></svg></span>
                                            <span>Global Settings</span>
                                        </span>
                                    </button>
                                </div>
                                <div class="settings-divider">
                                    <span>Available Widgets</span>
                                </div>
                                <div class="metrics-list custom-scrollbar">
                                    <!-- Dynamically populated metric radio cards go here -->
                                </div>
                            </section>

                            <!-- Middle Column -->
                            <section class="chart-types custom-scrollbar">
                                <div class="charttypes-list">
                                    <!-- Dynamically populated chart type radio cards go here -->
                                </div>
                            </section>

                            <!-- Right Column -->
                            <section class="settings-panel">
                                <div class="modal-settings-panel custom-scrollbar">
                                    <!-- Settings content goes here -->
                                </div>
                            </section>
                        </div>
                    </div>

                    <footer class="chart-settings-footer">
                        <button class="btn btn-dark btn-sm" onclick="document.getElementById('chart-settings-modal').close()">
                            Close
                        </button>
                    </footer>
                </div>
            </div>
        </dialog>
        <dialog id="stateManager" class="modal">
            <div class="modal-box">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-lg">Manage Views</h3>
                    <div class="flex gap-2 state-item-actions state-items-header">
                        <button class="btn icon" onclick="window.page.context.gridStateManager.importState()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" stroke="currentColor" width="16" height="16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                        d="M288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 242.7-73.4-73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l128 128c12.5 12.5 32.8 12.5 45.3 0l128-128c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L288 274.7 288 32zM64 352c-35.3 0-64 28.7-64 64l0 32c0 35.3 28.7 64 64 64l384 0c35.3 0 64-28.7 64-64l0-32c0-35.3-28.7-64-64-64l-101.5 0-45.3 45.3c-25 25-65.5 25-90.5 0L165.5 352 64 352zm368 56a24 24 0 1 1 0 48 24 24 0 1 1 0-48z"
                                />
                            </svg>
                            <span>Import</span>
                        </button>
                    </div>
                </div>
                <div class="state-list mb-4">
                    <!-- States will be populated here -->
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn-enhanced">Close</button>
                    </form>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>
    </div>

    <!-- Timer meta-modal -->
    <div class="meta-modal-overlay" id="timer-meta-modal-overlay" style="display:none">
        <div class="meta-modal" id="timer-meta-modal">
            <div class="meta-modal-header">
                <h2 class="meta-modal-title">Set Portfolio Timer</h2>
                <button class="meta-modal-close">
                    <i class="ti ti-x"></i>
                </button>
